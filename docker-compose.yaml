services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: botlog-clickhouse
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botlog-backend
    environment:
      - TRAP_PORT=8080
      - API_PORT=8081
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_DB=botlog
      - GEOIP_PATH=/data/GeoLite2-City.mmdb
    volumes:
      - ./data:/data
      - ./proxies.conf:/data/proxies.conf:ro
    depends_on:
      - clickhouse
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: botlog-frontend
    ports:
      - "8120:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  clickhouse_data:
